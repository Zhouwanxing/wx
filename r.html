<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <title>随机点数</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }

        html {
            touch-action: manipulation;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        #main {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
            transition: background 0.4s;
        }

        #number {
            font-size: 180px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
            user-select: none;
        }

        #range {
            position: fixed;
            bottom: 20px;
            left: 50%;
            padding: 10px;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(5px);
        }

        .control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button {
            width: 40px;
            height: 40px;
            text-align: center;
            font-size: 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div id="main">
    <div id="number">?</div>
</div>

<div id="range">
    <div class="control">
        <button onclick="changeMin(-1)">-</button>
        <span id="min">1</span>
        <button onclick="changeMin(1)">+</button>
    </div>
    ~
    <div class="control">
        <button onclick="changeMax(-1)">-</button>
        <span id="max">18</span>
        <button onclick="changeMax(1)">+</button>
    </div>
</div>

<script>

    let min = getDef("numMin", 1);
    let max = getDef("numMax", 18);

    const numberEl = document.getElementById("number")
    const main = document.getElementById("main")

    function randomColor() {
        return `hsl(${Math.random() * 360},70%,55%)`
    }

    function randomNumber() {
        numberEl.innerText = Math.floor(Math.random() * (max - min + 1)) + min
        main.style.background = randomColor()
    }

    // main.addEventListener("touchstart", randomNumber)
    main.addEventListener("click", randomNumber)

    function changeMin(step) {
        min += step
        if (min < 0) min = 0
        if (min >= max) min = max - 1
        localStorage.setItem("numMin", min);
        document.getElementById("min").innerText = min
    }

    function changeMax(step) {
        max += step
        if (max <= min) max = min + 1
        localStorage.setItem("numMax", max);
        document.getElementById("max").innerText = max
    }

    function getDef(key, def) {
        return localStorage.getItem(key) || def;
    }

</script>

</body>
</html>
