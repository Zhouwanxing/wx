<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>video</title>
</head>
<body>
<div id="name_id" style="text-align: center;"></div>
<video id="myVideo" controls webkit-playsinline playsinline style="width: 100%;height: 100%;">
    <source src="" type="video/mp4">
</video>
<div style="text-align: center;width: 100%;">
    <button onclick="changePlayMode()" style="width: 50%;padding: 5px;border-radius: 5px;">切换播放源</button>
</div>
<div style="text-align: center;width: 100%;">
    <button onclick="openInXx()" style="width: 50%;padding: 5px;border-radius: 5px;">官网打开</button>
</div>
<div style="text-align: center;width: 100%; margin-top: 20px;">
    <button onclick="addOne()" style="width: 50%;padding: 5px;border-radius: 5px;">+1</button>
</div>
<div style="text-align: center;width: 100%;" id="res_id">

</div>
<script src="https://cdn.staticfile.net/hls.js/1.6.13/hls.light.min.js"></script>
<script>
    const searchParams = new URL(window.location.href).searchParams;
    const id = searchParams.get('id'),
        baseUrl = searchParams.get('baseUrl'),
        tokenName = searchParams.get('tokenName'),
        tokenValue = searchParams.get('tokenValue');
    let useM3u8 = localStorage.getItem("mp4UseM3u8") === "true";
    let videoData = {};

    if (id) {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', baseUrl + "/mp4/findOneMp4?id=" + id, true);
        xhr.setRequestHeader(tokenName, tokenValue);
        xhr.onload = function () {
            if (xhr.status >= 200 && xhr.status < 300) {
                videoData = JSON.parse(xhr.responseText).data || {};
                refreshVideo();
            } else {
                console.error('Error:', xhr.statusText);
            }
        };
        xhr.onerror = () => console.error('Request failed');
        xhr.send();
    }

    function addOne() {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', baseUrl + "/mp4/useOneMp4?id=" + id, true);
        xhr.setRequestHeader(tokenName, tokenValue);
        xhr.onload = function () {
            if (xhr.status >= 200 && xhr.status < 300) {
                document.getElementById('res_id').innerHTML = xhr.responseText;
            } else {
                document.getElementById('res_id').innerHTML = xhr.statusText;
            }
        };
        xhr.onerror = function () {
            document.getElementById('res_id').innerHTML = "error";
        };
        xhr.send();
    }

    function openInXx() {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', baseUrl + "/mp4/getInXxUrl?id=" + id, true);
        xhr.setRequestHeader(tokenName, tokenValue);
        xhr.onload = function () {
            if (xhr.status >= 200 && xhr.status < 300) {
                let data = JSON.parse(xhr.responseText).data || {};
                window.open(data);
            } else {
                document.getElementById('res_id').innerHTML = xhr.statusText;
            }
        };
        xhr.onerror = function () {
            document.getElementById('res_id').innerHTML = "error";
        };
        xhr.send();
    }

    function changePlayMode() {
        useM3u8 = !useM3u8;
        localStorage.setItem("mp4UseM3u8", useM3u8 + "");
        refreshVideo();
    }

    function refreshVideo() {
        document.getElementById('name_id').innerHTML = `${videoData.name}[${videoData.useCount || 0}]-[${useM3u8 ? 'm3u8' : 'url'}]`;
        const videoElement = document.getElementById('myVideo');
        if (videoData.m3u8 && useM3u8 && Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource("https://publices.ttjkbx.com" + videoData.m3u8);
            hls.attachMedia(videoElement);
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                videoElement.play();
            });
        } else {
            videoElement.src = videoData.url;
            // 加载并播放视频
            videoElement.load();
            videoElement.play();
        }
    }
</script>
</body>
</html>
