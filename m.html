<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U8 Video Playback</title>
</head>
<body>
<h1>Play M3U8 Video</h1>

<div id="textDiv"></div>
<video id="video" controls style="width: 100%;height: 100%;"></video>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    const video = document.getElementById('video');
    const videoSrc = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';

    if (Hls.isSupported()) {
        document.getElementById('textDiv').innerHTML = 'HLS.js is supported.';
        const hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function () {
            video.play();
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        document.getElementById('textDiv').innerHTML = 'Your browser does not support HLS playback.';
        // 如果浏览器原生支持 HLS（例如 Safari）
        video.src = videoSrc;
        video.addEventListener('loadedmetadata', function () {
            video.play();
        });
    } else {
        alert('Your browser does not support HLS playback.');
    }
</script>
</body>
</html>
