<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U8 Video Playback</title>
</head>
<body>
<h1>Play M3U8 Video</h1>

<h1>hls</h1>
<video id="video1" controls style="width: 100%;height: 100%;"></video>

<h1>原生</h1>
<video id="video2" controls style="width: 100%;height: 100%;"></video>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    const video = document.getElementById('video');
    const videoSrc = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';

    if (Hls.isSupported()) {
        const video1 = document.getElementById('video1');
        const hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video1);
        hls.on(Hls.Events.MANIFEST_PARSED, function () {
            video1.play();
        });
    }
    const video2 = document.getElementById('video2');
    if (video2.canPlayType('application/vnd.apple.mpegurl')) {
        // 如果浏览器原生支持 HLS（例如 Safari）
        video2.src = videoSrc;
        video2.addEventListener('loadedmetadata', function () {
            video2.play();
        });
    } else {
        alert('Your browser does not support HLS playback.');
    }
</script>
</body>
</html>
