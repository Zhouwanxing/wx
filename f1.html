<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>成交趋势分析</title>
    <script src="https://cdn.staticfile.org/echarts/5.4.3/echarts.min.js"></script>
<!--    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>-->
    <style>
        body {
            font-family: Arial;
        }

        .chart {
            width: 900px;
            height: 420px;
            margin: 40px auto;
        }

        .record-section {
            width: 900px;
            margin: 0 auto 40px;
        }

        .record-section h2 {
            margin: 0 0 12px;
            font-size: 18px;
            font-weight: normal;
        }

        .record-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .record-table th,
        .record-table td {
            border: 1px solid #ddd;
            padding: 8px 10px;
            text-align: center;
        }

        .record-table th {
            background: #f5f5f5;
            cursor: pointer;
            user-select: none;
        }

        .record-table th:hover {
            background: #ebebeb;
        }

        .record-table tbody tr:nth-child(even) {
            background: #fafafa;
        }

        .record-table tbody tr:hover {
            background: #f0f7ff;
        }

        .record-table .col-time {
            color: #c0392b;
        }

        .record-table .col-floor {
            color: #c0392b;
        }

        .record-table .col-price,
        .record-table .col-unit {
            color: #2980b9;
        }
    </style>
</head>
<body>

<div id="trend" class="chart"></div>

<div class="record-section">
    <h2>成交记录（<span id="record-count">0</span> 条）</h2>
    <table class="record-table">
        <thead>
        <tr>
            <th data-key="createTime">成交时间</th>
            <th data-key="floor">楼层</th>
            <th data-key="area">面积(㎡)</th>
            <th data-key="price">总价(万)</th>
            <th data-key="unitPrice">单价(元/㎡)</th>
        </tr>
        </thead>
        <tbody id="record-list"></tbody>
    </table>
</div>

<div id="heatmap" class="chart" style="height: 1600px;"></div>


<script>
    const API_URL = 'https://goldtask.onrender.com/house/cj'; // ← 换成你的接口

    fetch(API_URL)
        .then(res => res.json())
        .then(res => {
            const data = res.data || [];
            handleTrend(data);
            handleRecordList(data);
            handleHeatmap(data);
        });

    let recordSortKey = 'createTime';
    let recordSortAsc = false;
    let recordRawData = [];

    function handleRecordList(rawData) {
        recordRawData = rawData.slice();
        renderRecordList();

        document.querySelectorAll('.record-table th[data-key]').forEach(th => {
            th.onclick = () => {
                const key = th.dataset.key;
                if (recordSortKey === key) {
                    recordSortAsc = !recordSortAsc;
                } else {
                    recordSortKey = key;
                    recordSortAsc = key === 'createTime' ? false : true;
                }
                renderRecordList();
            };
        });
    }

    function renderRecordList() {
        const list = recordRawData.slice().sort((a, b) => {
            const va = a[recordSortKey];
            const vb = b[recordSortKey];
            let cmp;
            if (recordSortKey === 'createTime') {
                cmp = String(va).localeCompare(String(vb));
            } else {
                cmp = (Number(va) || 0) - (Number(vb) || 0);
            }
            return recordSortAsc ? cmp : -cmp;
        });

        document.getElementById('record-count').textContent = list.length;
        document.getElementById('record-list').innerHTML = list.map(item => `
            <tr>
                <td class="col-time">${item.createTime || ''}</td>
                <td class="col-floor">${item.floor || ''}</td>
                <td>${item.area ?? ''}</td>
                <td class="col-price">${item.price ?? ''}</td>
                <td class="col-unit">${item.unitPrice ?? ''}</td>
            </tr>
        `).join('');

        document.querySelectorAll('.record-table th[data-key]').forEach(th => {
            const key = th.dataset.key;
            const label = th.textContent.replace(/ [⇑⇓]$/, '');
            th.textContent = label + (recordSortKey === key ? (recordSortAsc ? ' ⇑' : ' ⇓') : '');
        });
    }

    function handleTrend(rawData) {
        const map = {};
        rawData.forEach(item => {
            const key = item.createTime + '_' + item.floor;
            if (!map[key] || item.unitPrice < map[key].unitPrice) {
                map[key] = item;
            }
        });

// 2. 转数组并按时间排序
        const data = Object.values(map).sort((a, b) =>
            a.createTime.localeCompare(b.createTime)
        );

// 3. 获取完整的时间轴
        const dates = [...new Set(data.map(i => i.createTime))];

// 4. 按楼层组装三条线
        function buildSeries(floor) {
            return dates.map(date => {
                const item = data.find(d => d.createTime === date && d.floor === floor);
                return item ? item.unitPrice : null;
            });
        }

        const option = {
            tooltip: {
                trigger: 'axis'
            },
            legend: {
                data: ['低', '中', '高']
            },
            grid: {
                left: '8%',
                right: '5%',
                bottom: '10%'
            },
            xAxis: {
                type: 'category',
                data: dates,
                name: '成交时间'
            },
            yAxis: {
                type: 'value',
                name: '单价（元/㎡）'
            },
            series: [
                {
                    name: '低',
                    type: 'line',
                    connectNulls: true,
                    data: buildSeries('低')
                },
                {
                    name: '中',
                    type: 'line',
                    connectNulls: true,
                    data: buildSeries('中')
                },
                {
                    name: '高',
                    type: 'line',
                    connectNulls: true,
                    data: buildSeries('高')
                }
            ]
        };

        const chart = echarts.init(document.getElementById('trend'));
        chart.setOption(option);
    }

    function handleHeatmap(rawData) {
        var lastMap = {},otherMap = {};
        rawData.forEach(one => {
            var year = one.createTime.substring(0, 4);
            var day = one.createTime.replaceAll(".", "-");

            if (lastMap.hasOwnProperty(year)) {
                let yearList = lastMap[year];
                var find = yearList.find(oneYear => oneYear[0] === day);
                if (find) {
                    find[1]++;
                    otherMap[day].push(one);
                } else {
                    yearList.push([day, 1]);
                    otherMap[day] = [one];
                }
            } else {
                lastMap[year] = [[day, 1]];
                otherMap[day] = [one];
            }
        });
        console.log(lastMap);
        const option = {
            tooltip: {
                position: 'top'
            },
            formatter: function (params) {
                if (!params.data) return '';
                const [date, count] = params.data.value || params.data;
                let str = "";
                otherMap[date].forEach(one => {
                    str += `<tr><th>${one.floor}</th><th>${one.area}</th><th>${one.price}</th><th>${one.unitPrice}</th></tr>`;
                });
                return `<div style="padding:5px 10px">
                            <div style="font-weight:bold;margin-bottom:5px;text-align: center;">${date}</div>
                            <table border="1">
                                <thead>
                                <tr><th>楼层</th><th>面积</th><th>总价</th><th>单价</th></tr>
                                </thead>
                                <tbody>
                                    ${str}
                                </tbody>
                            </table>
                        </div>`;
            },
            visualMap: {
                min: 0,
                max: 4,
                calculable: true,
                orient: 'horizontal',
                left: 'center',
                top: 'top'
            },
            calendar: [],
            series: []
        };
        let count = 0;
        for (let key in lastMap) {
            option.calendar.push({
                top: 150 * count + 70,
                range: key,
                cellSize: ['auto', 15]
            });
            option.series.push({
                type: 'heatmap',
                coordinateSystem: 'calendar',
                calendarIndex: count++,
                data: lastMap[key]
            });
        }
        const chart = echarts.init(document.getElementById('heatmap'));
        chart.setOption(option);
    }
</script>

</body>
</html>
