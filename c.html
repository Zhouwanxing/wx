<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>贷款还款计算器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            padding: calc(16px + env(safe-area-inset-top, 0)) calc(16px + env(safe-area-inset-right, 0)) calc(16px + env(safe-area-inset-bottom, 0)) calc(16px + env(safe-area-inset-left, 0));
            background-color: #f9f9f9;
            touch-action: manipulation;
            -webkit-text-size-adjust: 100%;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 12px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
        }
        label {
            display: block;
            margin-top: 12px;
        }
        input[type="number"] {
            width: 100%;
            min-height: 44px;
            padding: 10px 12px;
            margin-top: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .repay-type {
            margin-top: 10px;
            display: flex;
            gap: 12px;
        }
        .repay-type label {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
            margin-top: 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px;
        }
        button {
            width: 100%;
            margin-top: 20px;
            min-height: 48px;
            padding: 12px;
            font-size: 16px;
            background-color: #0078d4;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .result, .details {
            margin-top: 20px;
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
        }
        .result {
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .details {
            max-height: 50vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            margin-top: 10px;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 6px 10px;
            text-align: right;
        }
        th {
            background-color: #bbdefb;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>贷款还款计算器</h2>

    <label for="loanAmount">贷款金额（元）：</label>
    <input type="number" inputmode="decimal" id="loanAmount" value="900000" step="10000">

    <label for="annualRate">年利率（%）：</label>
    <input type="number" inputmode="decimal" id="annualRate" value="2.85" step="0.01">

    <label for="years">贷款年限（年）：</label>
    <input type="number" inputmode="numeric" id="years" value="30">

    <div class="repay-type">
        <label><input type="radio" name="repayType" value="equalPrincipalAndInterest" checked> 等额本息</label>
        <label><input type="radio" name="repayType" value="equalPrincipal"> 等额本金</label>
    </div>

    <button onclick="calculate()">计算</button>

    <div class="result" id="result" style="display: none;"></div>
    <div class="details" id="details" style="display: none;"></div>
</div>

<script>
    function calculate() {
        const loanAmount = parseFloat(document.getElementById("loanAmount").value);
        const annualRate = parseFloat(document.getElementById("annualRate").value);
        const years = parseInt(document.getElementById("years").value);
        const months = years * 12;
        const monthlyRate = annualRate / 100 / 12;

        const repayType = document.querySelector('input[name="repayType"]:checked').value;
        const resultDiv = document.getElementById("result");
        const detailsDiv = document.getElementById("details");

        resultDiv.style.display = "block";
        detailsDiv.style.display = "none"; // 默认隐藏明细

        if (repayType === "equalPrincipalAndInterest") {
            // 等额本息
            const numerator = loanAmount * monthlyRate * Math.pow(1 + monthlyRate, months);
            const denominator = Math.pow(1 + monthlyRate, months) - 1;
            const monthlyPayment = numerator / denominator;
            const totalPayment = monthlyPayment * months;

            resultDiv.innerHTML = `
          <strong>还款方式：</strong>等额本息<br>
          <strong>每月还款：</strong>￥${monthlyPayment.toFixed(2)}<br>
          <strong>总还款金额：</strong>￥${totalPayment.toFixed(2)}
        `;
        } else if (repayType === "equalPrincipal") {
            // 等额本金
            const monthlyPrincipal = loanAmount / months;
            let totalPayment = 0;
            let tableRows = "";

            for (let i = 0; i < months; i++) {
                const remainingPrincipal = loanAmount - monthlyPrincipal * i;
                const interest = remainingPrincipal * monthlyRate;
                const monthlyPayment = monthlyPrincipal + interest;
                totalPayment += monthlyPayment;

                tableRows += `<tr><td>${i + 1}</td><td>￥${monthlyPayment.toFixed(2)}</td></tr>`;
            }

            const firstMonthPayment = monthlyPrincipal + loanAmount * monthlyRate;

            resultDiv.innerHTML = `
          <strong>还款方式：</strong>等额本金<br>
          <strong>首月还款：</strong>￥${firstMonthPayment.toFixed(2)}<br>
          <strong>总还款金额：</strong>￥${totalPayment.toFixed(2)}
        `;

            detailsDiv.style.display = "block";
            detailsDiv.innerHTML = `
          <strong>每月还款明细：</strong>
          <table>
            <thead>
              <tr><th>期数</th><th>当月还款</th></tr>
            </thead>
            <tbody>
              ${tableRows}
            </tbody>
          </table>
        `;
        }
    }
</script>
</body>
</html>
